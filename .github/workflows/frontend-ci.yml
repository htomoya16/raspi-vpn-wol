name: Frontend CI

on:
  # required check を常に返すため、trigger は絞らない。
  # 実行要否は下の "Detect frontend related changes" で判定する。
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect frontend related changes
        id: changes
        run: |
          set -euo pipefail
          # PR は base/head、push は before/after で差分範囲を作る。
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          # 初回 push など base が取れないケースは、履歴の先頭を比較元にする。
          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            base_sha="$(git rev-list --max-parents=0 "${head_sha}" | tail -n 1)"
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}" || true)"
          echo "${changed_files}"
          {
            # frontend 配下 or workflow 自身が変わった時だけ重い処理を実行する。
            if echo "${changed_files}" | grep -Eq '^(frontend/|\.github/workflows/frontend-ci\.yml$)'; then
              echo "should_run=true"
            else
              echo "should_run=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Skip frontend checks (no related changes)
        if: steps.changes.outputs.should_run != 'true'
        run: echo "No frontend-related changes. frontend-checks passes without running test steps."

      - name: Setup Node.js
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.should_run == 'true'
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.should_run == 'true'
        run: npm run lint

      - name: Type check
        if: steps.changes.outputs.should_run == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.changes.outputs.should_run == 'true'
        run: npm run test

      - name: Build
        if: steps.changes.outputs.should_run == 'true'
        run: npm run build
